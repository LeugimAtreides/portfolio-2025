# Render Blueprint — Django API (portfolio-2025).
# Put secrets in the Render Dashboard → Environment, not in git.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: portfolio-2025
    runtime: python
    repo: https://github.com/LeugimAtreides/portfolio-2025
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    autoDeploy: false
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: DJANGO_DEBUG
        sync: false
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: EXTERNAL_DATABASE_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_REGION_NAME
        sync: false
